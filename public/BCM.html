<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/BCM.css">
  <title>DXel BCM</title>
</head>
<body class="bcm-page">
  <div class="container">
    <header>
      <div class="headerBox1">
        <div class="logo">명함관리</div>
        <ul>
          <li><a href="./index.html">홈</a></li>
          <li><a href="./BCM.html" class="active">명함관리</a></li>
        </ul>
      </div>
      <div class="headerBox2">
        <a href="./cardAdd.html" class="cardAdd">+ 명함등록</a>
      </div>
    </header>

    <main class="bcmMain">
      <section class="bcmTools" aria-label="명함 검색 및 중복 필터">
        <form class="cardSearchForm" role="search">
          <div class="cardSearchField">
            <label for="cardSearch">이름 또는 회사 검색</label>
            <input
              type="search"
              id="cardSearch"
              placeholder="이름 또는 회사로 검색"
              autocomplete="off"
            >
            <button type="submit">검색</button>
          </div>
          <button
            class="duplicateToggle"
            type="button"
            aria-pressed="false"
          >
            중복 모아보기
          </button>
        </form>
        <p class="resultSummary" aria-live="polite">명함을 불러오는 중입니다.</p>
      </section>

      <section class="bcmBoard" aria-label="명함 목록"></section>
    </main>

    <footer>
      <div class="footerLeft">
        (c) 2026 DXEL BUSINESS CARD MANAGER
      </div>

      <div class="footerRight">
        <span class="sync serviceStatus serviceStatusOff" data-service="local-ai">
          <i></i>
          Local AI Ready
        </span>

        <span class="serviceStatus serviceStatusOff" data-service="sqlite">
          <i></i>
          SQLite
        </span>
        <span class="csvExport">CSV Export</span>
      </div>
    </footer>
  </div>
  <script src="./js/footerStatus.js"></script>
  <script src="./js/card.js"></script>
</body>
</html>
